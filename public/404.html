<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Japan Trip Planner</title>
    <!--
      GitHub Pages SPA trick (https://github.com/rafgraph/spa-github-pages)
      Encodes the current path into a query string so index.html can restore it.
      pathSegmentsToKeep = 1 preserves /japan-trip-planner in the URL.
    -->
    <script>
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol + '//' + l.host +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      )
    </script>
  </head>
  <body></body>
</html>
